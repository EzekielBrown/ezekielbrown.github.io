<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Question Cards</title>
    <link rel="stylesheet" href="styles/aiml428.css">
    <script src="scripts/aiml428.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Exam Study Cards</h1>
        <div class="button-container">
            <button onclick="switchCategory('algorithm')">AI-related Algorithm Design and Analysis</button>
            <button onclick="switchCategory('reinforcement')">Reinforcement Learning</button>
            <button onclick="switchCategory('foundational')">Foundational Models</button>
            <button onclick="switchCategory('cnn')">Convolutional Neural Networks for Image Synthesis</button>
        </div>

        <div id="question-card" class="card">
            <h2 id="category-title">Category Title</h2>
            <p id="question-text">Question will appear here</p>
            <button onclick="showAnswer()">Show Answer</button>
            <p id="answer-text" class="hidden">Answer will appear here</p>
            <button onclick="nextQuestion()">Next Question</button>
        </div>
    </div>
</body>
</html>
