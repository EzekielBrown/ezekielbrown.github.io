<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles/aiml428.css">
</head>
<body>
    <div class="quiz-container">
        <h1 id="section-header">Section Title</h1> <!-- Section header -->
        <div class="question-tracker">Question <span id="question-number">1</span>/12</div>
        <div class="question-container">
            <h2 id="question-text">Question goes here</h2>
        </div>
        <div class="answer-container">
            <button class="answer-button">Answer 1</button>
            <button class="answer-button">Answer 2</button>
            <button class="answer-button">Answer 3</button>
            <button class="answer-button">Answer 4</button>
        </div>
        <button id="next-button">Next Question</button>
        <button id="next-section-button">Next Section</button> <!-- Next Section Button always visible -->
        <button id="restart-button">Restart Quiz</button> <!-- Restart Button always visible -->
    </div>

    <script src="scripts/aiml428.js"></script>
</body>
</html>
